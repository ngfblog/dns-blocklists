name: Sync and Update
run-name: sync-and-update
on: 
  schedule:
    - cron: "0 0 * * *" # every night at midnight/12am
  push:
    branches:
      - main
jobs:
  upstream:
    runs-on: ubuntu-latest
    steps:
      - run: gh repo sync joshuaks/dns-blocklists --branch main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  generate:
    runs-on: ubuntu-latest
    needs: upstream
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          ref: 'main'
          sparse-checkout: |-
            adblock
            littlesnitch
      - name: Clean 'littlesnitch' directory
        run: |
          rm -f littlesnitch/*
      - name: Splitting files
        run: |
          for file in $(ls ./adblock); do
            echo "> splitting ${file}"
            new_filename="$(basename "${file}" | sed 's/\.txt//g' )_" 
            split -d -l200000 "./adblock/${file}" "./littlesnitch/${new_filename}"
            # little snitch supports max 200,000 entries per list
          done
      - name: rename files with .txt extensions 
        run: |
          for file in $(ls ./littlesnitch); do
            echo "> rename ./littlesnitch/${file}"
            mv "./littlesnitch/${file}" "./littlesnitch/${file}.txt"
          done
      - name: Git Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v4.16.0
        with:
          commit_message: Automated Change - Updated Little Snitch Files

